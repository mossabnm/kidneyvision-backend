[phases.setup]
nixPkgs = ['php83', 'php83Extensions.pdo', 'php83Extensions.pdo_mysql', 'php83Extensions.pdo_pgsql', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.fileinfo', 'php83Extensions.openssl', 'php83Extensions.tokenizer', 'php83Extensions.ctype']

[phases.build]
cmds = [
    'composer install --optimize-autoloader --no-dev',
    'mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
    'php artisan migrate --force'
]

[start]
cmd = 'php artisan serve --host=0.0.0.0 --port=${PORT:-8000}'
